# Converted from GitHub Actions — lkm (Linux Kernel Manager)
# Mirrors: ci.yml, publish.yml, flatpak.yml, appimage.yml

stages:
  - secret-scan
  - test
  - build
  - release

default:
  image: python:3.12

.pip-cache: &pip-cache
  cache:
    key:
      files: [pyproject.toml]
    paths: [.venv/]
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -e ".[dev]"

# ── CI ────────────────────────────────────────────────────────────────────────
test:python-3.11:
  stage: test
  image: python:3.11
  <<: *pip-cache
  script:
    - source .venv/bin/activate
    - ruff check lkm/ || true
    - pytest --tb=short
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

test:python-3.12:
  stage: test
  image: python:3.12
  <<: *pip-cache
  script:
    - source .venv/bin/activate
    - ruff check lkm/ || true
    - pytest --tb=short
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Build distribution ────────────────────────────────────────────────────────
build-dist:
  stage: build
  before_script:
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
  artifacts:
    paths: [dist/]
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

# ── Flatpak ───────────────────────────────────────────────────────────────────
flatpak:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends flatpak flatpak-builder elfutils librsvg2-common
    - flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
    - flatpak install -y --noninteractive flathub org.kde.Platform//6.7 org.kde.Sdk//6.7
  script:
    - flatpak-builder --force-clean --disable-rofiles-fuse build-dir pkg/flatpak/io.github.lkm.lkm.yml
    - flatpak run --command=appstreamcli org.kde.Sdk//6.7 validate pkg/flatpak/io.github.lkm.lkm.metainfo.xml || true
    - flatpak build-export repo build-dir
    - flatpak build-bundle repo LKM.flatpak io.github.lkm.lkm
  artifacts:
    paths: [LKM.flatpak]
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [pkg/flatpak/**/*]

# ── AppImage ──────────────────────────────────────────────────────────────────
appimage:x86_64:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends wget libfuse2 imagemagick python3-pip
  script:
    - ARCH=x86_64 OUT_DIR="${CI_PROJECT_DIR}/dist" bash pkg/appimage/build-appimage.sh
  artifacts:
    paths: [dist/LKM-*.AppImage]
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

# ── GitLab Release ────────────────────────────────────────────────────────────
gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build-dist, flatpak, appimage:x86_64]
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'LKM $CI_COMMIT_TAG'
    assets:
      links:
        - name: 'LKM.flatpak'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/LKM.flatpak?job=flatpak'
        - name: 'AppImage (x86_64)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse/dist?job=appimage:x86_64'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

secret-scan:
  stage: secret-scan
  image: python:3.12-slim
  before_script:
    - pip install git-filter-repo --quiet
  script:
    - |
      echo "Scanning commit history for leaked GitLab PATs..."
      git log --all -p | grep -E "glpat-[A-Za-z0-9_-]{20,}" && echo "LEAKED TOKEN DETECTED" && exit 1 || echo "No leaked tokens found."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|master)$/'
